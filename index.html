        return (
          <a

            href={href}
            target="_blank"
            rel="noreferrer"

            {children}
          </a>
        );

      function CardLight({ title, desc, bullets, cta, href, comingSoon }) {

        return (
          <div className="panel-light rounded-xl p-6 flex flex-col justify-between">

              <h3 className="font-semibold text-lg tracking-tight">{title}</h3>
              <p className="mt-2 text-sm text-ink/70">{desc}</p>

                <ul className="mt-4 space-y-2 text-sm text-ink/80">
                  {bullets.map((b, i) => (
                    <li key={i} className="flex gap-2">
                      <span className="text-ink/35">•</span>
                      <span>{b}</span>
                    </li>
                  ))}
                </ul>

              onClick={handleClick}
              className="mt-6 inline-flex w-fit rounded-lg px-4 py-2 btn-primary text-sm font-medium"
              aria-label={comingSoon ? "Coming soon" : cta}
              title={comingSoon ? "Coming soon" : ""}

                    <ArticleCard key={i} title={a.title} url={a.url} cta={t.articles.cta} />
                  ))}
                </div>

                <div className="mt-8">
                  <a href={linkedinUrl} target="_blank" rel="noreferrer" className="inline-flex rounded-lg px-4 py-2 btn-primary text-sm font-medium">
                    {t.articles.all}
                  </a>
                </div>
              </div>
            </section>

            {/* PODCASTS */}
            <section id="podcasts" className="soft-wash border-t border-black/5">
              <div className="max-w-6xl mx-auto px-4 py-14">
                <h2 className="text-2xl md:text-3xl font-semibold tracking-tight">{t.podcasts.title}</h2>
                <p className="mt-2 text-ink/70">{t.podcasts.desc}</p>

                <div className="mt-6 grid md:grid-cols-2 gap-6">
                  <div className="panel-light rounded-xl p-6">
                    <div className="font-semibold">Spotify</div>
                    <p className="mt-2 text-sm text-ink/70">{t.podcasts.hint}</p>
                  </div>

                  <div className="panel-light rounded-xl p-6">
                    <div className="font-semibold">{t.podcasts.yt}</div>
                    <p className="mt-2 text-sm text-ink/70">
                      {lang==="en" ? "Full list of podcast episodes on YouTube." : "Lista completa dos episódios no YouTube."}
                    </p>
                    <a
                      href={youtubePodcastsUrl}
                      target="_blank"
                      rel="noreferrer"
                      className="mt-4 inline-flex rounded-lg px-4 py-2 btn-primary text-sm font-medium"
                    >
                      {t.podcasts.open}
                    </a>
                  </div>
                </div>
              </div>
            </section>

            {/* CONTACT (mailto) */}
            <section id="contact" className="border-t border-black/5 bg-white">
              <div className="max-w-6xl mx-auto px-4 py-14 grid md:grid-cols-2 gap-8 items-start">
                <div>
                  <h2 className="text-2xl md:text-3xl font-semibold tracking-tight">{t.contact.title}</h2>
                  <p className="mt-2 text-ink/75">{t.contact.desc}</p>

                  <div className="mt-4 text-sm text-ink/70">
                    LinkedIn: <InlineLink light href={linkedinUrl}>{linkedinUrl}</InlineLink>
                  </div>

                  <div className="mt-3 text-sm text-ink/70">
                    Email: <span className="font-medium">{emailTo}</span>
                  </div>
                </div>

                <div className="panel-light rounded-xl p-6">
                  <form className="grid gap-3" onSubmit={handleMailTo}>
                    <input name="name" className="hairline rounded-md px-4 py-3 bg-white" placeholder={t.contact.name} />
                    <input name="email" className="hairline rounded-md px-4 py-3 bg-white" placeholder="Email" />
                    <select name="topic" className="hairline rounded-md px-4 py-3 bg-white">
                      <option value={lang==="en" ? "Company (services)" : "Empresa (serviços)"}>{lang==="en" ? "I'm a company (services)" : "Sou empresa (serviços)"}</option>
                      <option value={lang==="en" ? "Individual (mentoring)" : "Pessoa (mentoria)"}>{lang==="en" ? "I'm an individual (mentoring)" : "Sou pessoa (mentoria)"}</option>
                      <option value={lang==="en" ? "Event (speaking)" : "Evento (palestra)"}>{lang==="en" ? "Event invitation (speaking)" : "Convite para palestra"}</option>
                    </select>
                    <textarea name="message" className="hairline rounded-md px-4 py-3 bg-white" rows="4" placeholder={t.contact.msg}></textarea>

                    <button type="submit" className="rounded-lg px-5 py-3 btn-primary text-sm font-medium">
                      {t.contact.cta}
                    </button>

                    <p className="text-xs text-ink/55">
                      {lang==="en"
                        ? "GitHub Pages has no backend. This button opens your email client to send an email."
                        : "GitHub Pages não tem backend. Este botão abre seu app de e-mail para enviar a mensagem."}
                    </p>
                  </form>
                </div>
              </div>
            </section>

            <footer className="border-t border-black/5">
              <div className="max-w-6xl mx-auto px-4 py-10 text-sm text-ink/60 flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
                <div>© {new Date().getFullYear()} Aline da Silva Souza. All rights reserved.</div>
                <div className="flex gap-4 flex-wrap">
                  <a className="link" href={linkedinUrl} target="_blank" rel="noreferrer">LinkedIn</a>
                  <a className="link" href={youtubePodcastsUrl} target="_blank" rel="noreferrer">YouTube</a>
                </div>
              </div>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<Landing />);
    </script>
  </body>
</html>
