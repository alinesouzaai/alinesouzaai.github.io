          radial-gradient(900px 650px at 75% 35%, rgba(124,92,255,.18), transparent 60%),

          linear-gradient(180deg, #060913 0%, #070A16 70%, #060913 100%);

      .bg-grid::before{
        content:"";
        position:absolute; inset:0;
        background-image:
          linear-gradient(to right, rgba(255,255,255,.06) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,.06) 1px, transparent 1px);
        background-size: 56px 56px;
        opacity: .12;
        mask-image: radial-gradient(900px 520px at 50% 20%, #000 35%, transparent 70%);

        border: 1px solid rgba(255,255,255,.10);
        backdrop-filter: blur(14px);
      }

      }

      .btn-primary {
        background: linear-gradient(90deg, rgba(79,227,255,.95), rgba(124,92,255,.95));

      .btn-primary:hover { filter: brightness(1.07); }

      .btn-ghost {
        border: 1px solid rgba(255,255,255,.14);
        background: rgba(255,255,255,.03);
      }
      .btn-ghost:hover { background: rgba(255,255,255,.06); }

      }

      .grad-text {
        background: linear-gradient(90deg, #4FE3FF, #7C5CFF);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

                  <PackageCard name={t.packages.starter.name} desc={t.packages.starter.desc} ctaLabel={t.packages.cta} />
                  <PackageCard name={t.packages.pro.name} desc={t.packages.pro.desc} featured ctaLabel={t.packages.cta} />
                  <PackageCard name={t.packages.enterprise.name} desc={t.packages.enterprise.desc} ctaLabel={t.packages.cta} />
                </div>
              </Container>
            </section>

            {/* Mentorship */}
            <section id="mentorship" className="py-14 border-t border-line">
              <Container>
                <SectionTitle
                  kicker={t.mentorship.kicker}
                  title={t.mentorship.title}
                  desc={t.mentorship.desc}
                />

                <div className="grid lg:grid-cols-2 gap-6">
                  <div className="glass rounded-xl2 p-7 md:p-9 shadow-glow">
                    <div className="text-sm font-semibold">
                      {lang === "en" ? "What you get" : "O que você recebe"}
                    </div>
                    <ul className="mt-4 space-y-3 text-text-200">
                      {t.mentorship.bullets.map((b, i) => (
                        <li key={i} className="flex gap-3">
                          <span className="text-neon-b">•</span>
                          <span className="text-sm md:text-base leading-relaxed">{b}</span>
                        </li>
                      ))}
                    </ul>

                    <a href="#contact" className="mt-6 inline-flex rounded-xl px-5 py-3 btn-primary font-semibold">
                      {t.mentorship.apply}
                    </a>

                    <div className="mt-5 text-xs text-text-300">
                      {lang === "en"
                        ? "Application-based. Limited spots monthly."
                        : "Com aplicação. Vagas limitadas por mês."}
                    </div>
                  </div>

                  <div className="grid gap-6">
                    <div className="text-sm font-semibold text-text-100">{t.mentorship.testimonialsTitle}</div>
                    <div className="grid gap-6">
                      {t.mentorship.testimonials.map((x, i) => (
                        <Testimonial key={i} quote={x.quote} name={x.name} role={x.role} />
                      ))}
                    </div>
                  </div>
                </div>
              </Container>
            </section>

            {/* Speaking */}
            <section id="speaking" className="py-14 border-t border-line">
              <Container>
                <SectionTitle
                  kicker={t.speaking.kicker}
                  title={t.speaking.title}
                  desc={t.speaking.desc}
                />

                <div className="grid lg:grid-cols-2 gap-6 items-start">
                  <div className="glass rounded-xl2 p-7 md:p-9 shadow-glow">
                    <div className="text-sm font-semibold">{t.speaking.topicsTitle}</div>
                    <ul className="mt-4 space-y-3 text-text-200">
                      {t.speaking.topics.map((topic, i) => (
                        <li key={i} className="flex gap-3">
                          <span className="text-neon-a">•</span>
                          <span className="text-sm md:text-base leading-relaxed">{topic}</span>
                        </li>
                      ))}
                    </ul>
                    <a href="#contact" className="mt-6 inline-flex rounded-xl px-5 py-3 btn-primary font-semibold">
                      {t.speaking.invite}
                    </a>
                  </div>

                  <div>
                    <div className="text-sm font-semibold mb-4">{t.speaking.galleryTitle}</div>
                    <div className="grid sm:grid-cols-2 gap-4">
                      <GalleryTile label={lang === "en" ? "Add event photo 1" : "Adicionar foto 1"} />
                      <GalleryTile label={lang === "en" ? "Add event photo 2" : "Adicionar foto 2"} />
                      <div className="sm:col-span-2">
                        <div className="rounded-xl2 overflow-hidden hairline bg-gradient-to-br from-neon-b/10 via-white/0 to-neon-a/10 aspect-[16/9] flex items-end">
                          <div className="w-full p-4 text-xs text-text-300 bg-ink-900/40 backdrop-blur border-t border-line">
                            {lang === "en" ? "Add wide event photo / stage shot" : "Adicionar foto horizontal / palco"}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="mt-10">
                  <div className="text-sm font-semibold mb-4">{t.speaking.feedbackTitle}</div>
                  <div className="grid md:grid-cols-2 gap-6">
                    {t.speaking.feedback.map((x, i) => (
                      <Testimonial key={i} quote={x.quote} name={x.name} role={x.role} />
                    ))}
                  </div>
                </div>
              </Container>
            </section>

            {/* Contact */}
            <section id="contact" className="py-14 border-t border-line">
              <Container>
                <div className="grid lg:grid-cols-2 gap-8 items-start">
                  <div>
                    <SectionTitle
                      kicker={lang === "en" ? "Contact" : "Contato"}
                      title={t.contact.title}
                      desc={t.contact.sub}
                    />

                    <form className="grid gap-3 max-w-lg">
                      <input
                        className="glass rounded-xl px-4 py-3 text-sm text-text-100 placeholder:text-text-400 outline-none focus:ring-2 focus:ring-neon-b/40"
                        placeholder={t.contact.placeholders.name}
                      />
                      <input
                        className="glass rounded-xl px-4 py-3 text-sm text-text-100 placeholder:text-text-400 outline-none focus:ring-2 focus:ring-neon-b/40"
                        placeholder={t.contact.placeholders.email}
                      />
                      <textarea
                        className="glass rounded-xl px-4 py-3 text-sm text-text-100 placeholder:text-text-400 outline-none focus:ring-2 focus:ring-neon-b/40"
                        placeholder={t.contact.placeholders.msg}
                        rows="5"
                      />
                      <button
                        type="button"
                        className="rounded-xl px-5 py-3 btn-primary font-semibold"
                      >
                        {t.contact.cta}
                      </button>
                      <p className="text-xs text-text-400">
                        {lang === "en" ? "* LinkedIn/Instagram DM also works." : "* DM no LinkedIn/Instagram também funciona."}
                      </p>
                    </form>
                  </div>

                  <div className="glass rounded-xl2 p-7 md:p-9 shadow-glow">
                    <div className="text-sm font-semibold">{t.contact.stepsTitle}</div>
                    <ol className="mt-4 space-y-3 text-text-200 list-decimal list-inside">
                      {t.contact.steps.map((s, i) => (
                        <li key={i} className="text-sm md:text-base leading-relaxed">{s}</li>
                      ))}
                    </ol>

                    <div className="mt-6 chip rounded-xl2 p-5 text-sm text-text-200 leading-relaxed">
                      {lang === "en"
                        ? "If you want: send 1) your goal, 2) your context, 3) the deadline. I’ll reply with next steps."
                        : "Se quiser: envie 1) seu objetivo, 2) contexto, 3) prazo. Eu respondo com próximos passos."}
                    </div>
                  </div>
                </div>
              </Container>
            </section>

            {/* Footer */}
            <footer className="border-t border-line py-10">
              <Container>
                <div className="flex flex-col md:flex-row gap-3 md:items-center md:justify-between text-sm text-text-300">
                  <div>
                    © {new Date().getFullYear()} Aline da Silva Souza. {t.footer.rights}
                  </div>
                  <div className="flex gap-4">
                    <a className="hover:text-text-100" href="#">Privacy</a>
                    <a className="hover:text-text-100" href="#">Terms</a>
                    <a className="hover:text-text-100" href="#">LinkedIn</a>
                    <a className="hover:text-text-100" href="#">Instagram</a>
                  </div>
                </div>
              </Container>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<LandingAline />);
    </script>
  </body>
</html>
