    <script type="text/babel">
      function Img(props) {
        return (
          <img

            onError={(e) => { e.currentTarget.style.display = "none"; }}
          />
        );
      }

      function Card({ title, desc, bullets, cta, ctaHref="#contact" }) {
        return (
          <div className="panel rXl p-6 shadow-soft flex flex-col justify-between">
            <div>
              <h3 className="font-semibold text-lg tracking-tight">{title}</h3>
              <p className="mt-2 text-sm muted">{desc}</p>
              {bullets?.length ? (
                <ul className="mt-4 space-y-2 text-sm text-ink/80">
                  {bullets.map((b, i) => (
                    <li key={i} className="flex gap-2">
                      <span className="text-ink/40">•</span>
                      <span>{b}</span>
                    </li>
                  ))}
                </ul>
              ) : null}
            </div>

            <a href={ctaHref} className="mt-6 inline-flex w-fit rLg px-4 py-2 btn-primary text-sm font-medium">
              {cta}
            </a>
          </div>
        );
      }

      function InlineLink({ href, children }) {
        return (
          <a className="link underline decoration-black/20 underline-offset-4" href={href} target="_blank" rel="noreferrer">
            {children}
          </a>
        );
      }

      function Embed({ html }) {
        if (!html) return null;
        return <div className="mt-4" dangerouslySetInnerHTML={{ __html: html }} />;

                      <option>{lang==="en" ? "Event invitation (speaking)" : "Convite para palestra"}</option>
                    </select>
                    <textarea className="hairline rMd px-4 py-3 bg-white" rows="4" placeholder={lang==="en" ? "Message" : "Mensagem"}></textarea>

                    {/* GitHub Pages não roda backend.
                        Para receber mensagens, conecte esse form a Formspree/Tally/Getform e defina action/method.
                    */}

                    <button type="button" className="rLg px-5 py-3 btn-primary text-sm font-medium">
                      {t.contact.cta}
                    </button>

                    <p className="text-xs text-ink/50">
                      {lang==="en"
                        ? "To collect submissions, connect this form to Formspree/Tally/Getform (no backend needed)."
                        : "Para receber envios, conecte este form ao Formspree/Tally/Getform (sem backend)."}
                    </p>
                  </form>
                </div>
              </div>
            </section>

            <footer className="divider">
              <div className="max-w-6xl mx-auto px-4 py-10 text-sm text-ink/60 flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
                <div>{t.footer.rights} {new Date().getFullYear()} Aline da Silva Souza. All rights reserved.</div>
                <div className="flex gap-4 flex-wrap">
                  <a className="link" href={linkedinUrl} target="_blank" rel="noreferrer">LinkedIn</a>
                </div>
              </div>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<Landing />);
    </script>
  </body>
</html>
