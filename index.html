<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Aline - Human-Centered AI</title>

    <link rel="icon" type="image/png" href="./assets/brand/favicon.png" />

    <!-- Tailwind (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React 18 (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (JSX no navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Theme: modern executive (less rounded) -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#0B0F1A",
              sub: "rgba(11,15,26,.72)",
              line: "rgba(11,15,26,.10)",
              soft: "#F6F7FB",
              accent: "#2D6BFF"
            },
            boxShadow: {
              soft: "0 10px 30px rgba(11,15,26,.06)",
              soft2: "0 18px 50px rgba(11,15,26,.08)"
            },
            borderRadius: {
              xl: "14px",
              lg: "12px",
              md: "10px"
            }
          }
        }
      };
    </script>

    <style>
      :root { color-scheme: light; }
      body { background: #F6F7FB; }

      .panel{
        background: rgba(255,255,255,.86);
        border: 1px solid rgba(11,15,26,.10);
        backdrop-filter: blur(10px);
      }

      .btn-primary{ background:#0B0F1A; color:#fff; }
      .btn-primary:hover{ opacity:.92; }

      .btn-ghost{
        background: transparent;
        border: 1px solid rgba(11,15,26,.16);
        color:#0B0F1A;
      }
      .btn-ghost:hover{ background: rgba(11,15,26,.04); }

      .link:hover{ opacity:.78; }

      /* substitui sua "hairline" */
      .hairline{
        border: 1px solid rgba(11,15,26,.14);
      }
    </style>
  </head>

  <body class="text-ink">
    <div id="root"></div>

    <script type="text/babel">
      function Card({ title, desc, bullets, cta, ctaHref="#contact" }) {
        return (
          <div className="panel rounded-xl p-6 shadow-soft flex flex-col justify-between">
            <div>
              <h3 className="font-semibold text-lg tracking-tight">{title}</h3>
              <p className="mt-2 text-sm text-[color:rgba(11,15,26,.72)]">{desc}</p>
              {bullets?.length ? (
                <ul className="mt-4 space-y-2 text-sm text-ink/80">
                  {bullets.map((b, i) => (
                    <li key={i} className="flex gap-2">
                      <span className="text-ink/50">•</span>
                      <span>{b}</span>
                    </li>
                  ))}
                </ul>
              ) : null}
            </div>

            <a href={ctaHref} className="mt-6 inline-flex w-fit rounded-lg px-4 py-2 btn-primary text-sm">
              {cta}
            </a>
          </div>
        );
      }

      function InlineLink({ href, children }) {
        return (
          <a className="link underline decoration-black/20 underline-offset-4" href={href} target="_blank" rel="noreferrer">
            {children}
          </a>
        );
      }

      // render seguro de iframe (Spotify/YouTube)
      function Embed({ html }) {
        if (!html) return null;
        return (
          <div
            className="mt-4"
            dangerouslySetInnerHTML={{ __html: html }}
          />
        );
      }

      function Landing() {
        const [lang, setLang] = React.useState("en");

        const dict = {
          en: {
            brand: "Aline — Human-Centered AI",
            nav: { services:"Services", mentoring:"Mentoring", speaking:"Speaking", articles:"Articles", podcasts:"Podcasts", contact:"Contact" },
            hero: {
              pre: "Strategy • Governance • Value",
              title: "Human-centered AI for leaders who want real impact.",
              subtitle: "I help organizations turn vision into outcomes — with people at the center, well-governed data, and decisions that last.",
              cta1: "Book a call",
              cta2: "LinkedIn"
            },
            philosophy: {
              title: "How I work",
              items: [
                "People before models: technology is the means, not the end.",
                "Strategic clarity: a well-framed problem is half solved.",
                "Elegant governance: simple enough to scale."
              ]
            },
            services: {
              title: "Core services",
              cta: "Request proposal",
              cards: [
                { title:"Strategic AI Retainer", desc:"Direction, governance and prioritization with executive rhythm.", bullets:["Clear roadmap","Quarterly OKRs","Adoption over hype"] },
                { title:"ML Canvas → Value Program", desc:"From hypothesis to scale plan with responsible experimentation.", bullets:["Executive alignment","2–4 week experiment","Scale plan"] },
                { title:"Corporate Training", desc:"Tailored tracks for data, risk and audit teams.", bullets:["Practical frameworks","Templates & playbooks","Certificate"] }
              ]
            },
            mentoring: {
              title: "Mentoring (1:1) — Women in Tech focus",
              desc: "A strategic, straight-to-the-point session to define your next 90 days. Primary focus: women in technology. Men are also welcome.",
              bullets: ["Career direction","Positioning & storytelling","Interview strategy","Leadership presence"],
              cta: "Apply for mentoring"
            },
            speaking: {
              title: "Keynote Speaker & Events",
              desc: "Talks in English or Portuguese. Topics: AI strategy, governance, human-centered transformation, and career building.",
              cta: "Invite me to speak",
              proof: "Media kit + testimonials available upon request."
            },
            articles: {
              title: "Articles",
              desc: "Published on LinkedIn. Featured reads:",
              cta: "Read on LinkedIn"
            },
            podcasts: {
              title: "Podcasts",
              desc: "Listen on Spotify and watch on YouTube."
            },
            contact: {
              title: "Contact",
              desc: "For companies: request services. For individuals: mentoring application.",
              cta: "Send message"
            },
            footer: { rights: "©" },
            labels: { language:"Language" }
          },
          pt: {
            brand: "Aline — IA Humanizada",
            nav: { services:"Serviços", mentoring:"Mentoria", speaking:"Palestras", articles:"Artigos", podcasts:"Podcasts", contact:"Contato" },
            hero: {
              pre: "Estratégia • Governança • Valor",
              title: "IA humanizada para líderes que buscam impacto real.",
              subtitle: "Eu ajudo organizações a transformar visão em resultados — com gente no centro, dados bem cuidados e decisões que resistem ao tempo.",
              cta1: "Agendar conversa",
              cta2: "LinkedIn"
            },
            philosophy: {
              title: "Como eu trabalho",
              items: [
                "Pessoas antes de modelos: tecnologia é meio, não fim.",
                "Clareza estratégica: problema bem definido é metade resolvido.",
                "Governança elegante: simples o suficiente para escalar."
              ]
            },
            services: {
              title: "Serviços principais",
              cta: "Solicitar proposta",
              cards: [
                { title:"Retainer de IA Estratégica", desc:"Direção, governança e priorização com ritmo executivo.", bullets:["Roadmap claro","OKRs trimestrais","Adoção > hype"] },
                { title:"Programa ML Canvas → Valor", desc:"Da hipótese ao plano de escala com experimentos responsáveis.", bullets:["Alinhamento executivo","Experimento 2–4 semanas","Plano de escala"] },
                { title:"Treinamento Corporativo", desc:"Trilhas para times de dados, risco e auditoria.", bullets:["Frameworks práticos","Templates & playbooks","Certificado"] }
              ]
            },
            mentoring: {
              title: "Mentoria (1:1) — Foco em mulheres na tecnologia",
              desc: "Sessão estratégica e direta para definir seus próximos 90 dias. O foco são mulheres em tecnologia. Homens também são bem-vindos.",
              bullets: ["Direção de carreira","Posicionamento & narrativa","Entrevistas","Presença de liderança"],
              cta: "Aplicar para mentoria"
            },
            speaking: {
              title: "Keynote Speaker & Eventos",
              desc: "Palestras em inglês ou português. Temas: estratégia em IA, governança, transformação humanizada e carreira.",

              proof: "Media kit + depoimentos sob solicitação."
            },
            articles: {
              title: "Artigos",
              desc: "Publicados no LinkedIn. Leituras em destaque:",
              cta: "Ler no LinkedIn"
            },
            podcasts: {
              title: "Podcasts",
              desc: "Ouça no Spotify e assista no YouTube."
            },
            contact: {
              title: "Contato",
              desc: "Empresas: solicitação de serviços. Pessoas: aplicação para mentoria.",
              cta: "Enviar mensagem"
            },
            footer: { rights: "©" },
            labels: { language:"Idioma" }
          }
        };

        const t = dict[lang];

        // atualiza <html lang="">
        React.useEffect(() => {
          document.documentElement.lang = lang === "pt" ? "pt" : "en";
        }, [lang]);

        // LINKS EXTERNOS
        const linkedinUrl = "https://www.linkedin.com/in/alinedatascientist/";

        // Artigos (adicione aqui os seus links)
        const articles = [
          // { title: "AI Governance That Ships: ML Canvas as the Bridge Between Risk and Real Value", url: "COLE_O_LINK_DO_POST" },
        ];

        // EMBEDS (cole o iframe completo aqui como string)
        const spotifyEmbed = null; // ex: '<iframe style="border-radius:12px" src="..." width="100%" height="152" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>'
        const youtubeEmbed = null; // ex: '<iframe width="100%" height="315" src="..." title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>'

        const mentoringImg = "./assets/img/mentoring-01.jpg";
        const speaker1 = "./assets/img/speaker-01.jpg";
        const speaker2 = "./assets/img/speaker-02.jpg";

        const Img = (props) => (
          <img
            {...props}
            onError={(e) => {
              e.currentTarget.style.display = "none";
            }}
          />
        );

        return (
          <div className="min-h-screen">
            {/* Header */}
            <header className="sticky top-0 z-40 border-b border-line bg-white/80 backdrop-blur">
              <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                <a href="#" className="flex items-center gap-3">
                  <img

                    alt="Aline Data Scientist"
                    className="h-8 w-auto"
                  />

                    {t.brand}

                </a>

                <nav className="hidden md:flex items-center gap-6 text-sm text-ink/80">
                  <a className="link" href="#services">{t.nav.services}</a>
                  <a className="link" href="#mentoring">{t.nav.mentoring}</a>
                  <a className="link" href="#speaking">{t.nav.speaking}</a>
                  <a className="link" href="#articles">{t.nav.articles}</a>
                  <a className="link" href="#podcasts">{t.nav.podcasts}</a>
                  <a className="link" href="#contact">{t.nav.contact}</a>

                <div className="flex items-center gap-2">
                  <select
                    aria-label={t.labels.language}
                    className="hairline rounded-md px-2 py-2 text-sm bg-white"
                    value={lang}
                    onChange={(e) => setLang(e.target.value)}
                  >
                    <option value="en">EN</option>
                    <option value="pt">PT</option>
                  </select>

                  <a href="#contact" className="hidden sm:inline-flex rounded-lg px-4 py-2 btn-primary text-sm">
                    {t.hero.cta1}
                  </a>
                </div>
              </div>
            </header>

            {/* HERO */}
            <section className="relative overflow-hidden">
              <div className="absolute inset-0">
                <Img
                  src={heroImg}
                  alt=""
                  className="h-full w-full object-cover"
                />
                <div className="absolute inset-0 bg-gradient-to-br from-black/75 via-black/45 to-black/75"></div>
                <div className="absolute -top-20 left-1/2 h-96 w-96 -translate-x-1/2 rounded-full bg-cyan-400/20 blur-3xl"></div>
              </div>

              <div className="relative max-w-6xl mx-auto px-4 py-16 grid md:grid-cols-2 gap-10 items-center text-white">
                <div>
                  <p className="uppercase tracking-widest text-xs text-white/70">{t.hero.pre}</p>
                  <h1 className="mt-2 text-4xl md:text-5xl font-semibold leading-tight">{t.hero.title}</h1>
                  <p className="mt-5 text-lg text-white/80 max-w-xl">{t.hero.subtitle}</p>

                  <div className="mt-7 flex gap-3 flex-wrap">
                    <a href="#contact" className="rounded-lg px-5 py-3 bg-white text-black hover:opacity-90">
                      {t.hero.cta1}
                    </a>
                    <a
                      href={linkedinUrl}
                      target="_blank"
                      rel="noreferrer"
                      className="rounded-lg px-5 py-3 border border-white/30 hover:bg-white/10"
                    >
                      {t.hero.cta2}
                    </a>
                  </div>

                    {t.philosophy.items.map((it, i) => (
                      <div key={i} className="flex gap-2">
                        <span className="text-white/50">•</span><span>{it}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="panel rounded-xl p-6 shadow-soft2 bg-white/10 border border-white/15 backdrop-blur">

                  <h3 className="mt-4 font-semibold">{t.philosophy.title}</h3>
                  <ul className="mt-3 space-y-2 text-white/80 text-sm">
                    {t.philosophy.items.map((it, i) => (
                      <li key={i} className="flex gap-2">
                        <span className="text-white/50">•</span>
                        <span>{it}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </section>

            {/* SERVICES */}
            <section id="services" className="border-t border-line">
              <div className="max-w-6xl mx-auto px-4 py-14">
                <h2 className="text-2xl md:text-3xl font-semibold tracking-tight">{t.services.title}</h2>
                <div className="grid md:grid-cols-3 gap-6 mt-8">
                  {t.services.cards.map((c, idx) => (
                    <Card key={idx} title={c.title} desc={c.desc} bullets={c.bullets} cta={t.services.cta} />
                  ))}
                </div>
              </div>
            </section>

            {/* MENTORING */}
            <section id="mentoring" className="border-t border-line bg-white">
              <div className="max-w-6xl mx-auto px-4 py-14 grid md:grid-cols-2 gap-8 items-center">
                <div>
                  <h2 className="text-2xl md:text-3xl font-semibold tracking-tight">{t.mentoring.title}</h2>
                  <p className="mt-3 text-ink/75">{t.mentoring.desc}</p>
                  <ul className="mt-5 space-y-2 text-sm text-ink/80">
                    {t.mentoring.bullets.map((b, i) => (
                      <li key={i} className="flex gap-2">
                        <span className="text-ink/40">•</span><span>{b}</span>
                      </li>
                    ))}
                  </ul>
                  <a href="#contact" className="mt-6 inline-flex rounded-lg px-5 py-3 btn-primary text-sm">
                    {t.mentoring.cta}
                  </a>
                </div>

                <div className="panel rounded-xl p-6 shadow-soft">
                  <Img
                    src={mentoringImg}
                    alt="Mentoring"
                    className="w-full h-56 object-cover rounded-lg border border-line"
                  />
                  <p className="mt-4 text-sm text-ink/70">
                    {lang === "en"
                      ? "Mentoring is a structured conversation: clarity, positioning, and a 90-day execution plan."
                      : "A mentoria é uma conversa estruturada: clareza, posicionamento e um plano de execução de 90 dias."}
                  </p>
                </div>
              </div>
            </section>

            {/* SPEAKING */}
            <section id="speaking" className="border-t border-line">
              <div className="max-w-6xl mx-auto px-4 py-14 grid md:grid-cols-2 gap-8 items-center">
                <div>
                  <h2 className="text-2xl md:text-3xl font-semibold tracking-tight">{t.speaking.title}</h2>
                  <p className="mt-3 text-ink/75">{t.speaking.desc}</p>
                  <p className="mt-2 text-sm text-ink/60">{t.speaking.proof}</p>

                  <a href="#contact" className="mt-6 inline-flex rounded-lg px-5 py-3 btn-primary text-sm">
                    {t.speaking.cta}
                  </a>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <Img src={speaker1} alt="Speaking 1" className="w-full h-44 object-cover rounded-lg border border-line" />
                  <Img src={speaker2} alt="Speaking 2" className="w-full h-44 object-cover rounded-lg border border-line" />
                  <div className="col-span-2 panel rounded-xl p-5 shadow-soft">
                    <div className="text-sm text-ink/70">
                      {lang === "en"
                        ? "Add testimonials as images later (e.g., /assets/img/testimonial-01.png) and link them here."
                        : "Adicione depoimentos como imagens depois (ex.: /assets/img/testimonial-01.png) e linke aqui."}
                    </div>
                  </div>
                </div>
              </div>
            </section>

            {/* ARTICLES */}
            <section id="articles" className="border-t border-line bg-white">
              <div className="max-w-6xl mx-auto px-4 py-14">
                <h2 className="text-2xl md:text-3xl font-semibold tracking-tight">{t.articles.title}</h2>
                <p className="mt-2 text-ink/70">{t.articles.desc}</p>

                <div className="mt-6 grid md:grid-cols-3 gap-6">
                  {(articles.length ? articles : [
                    { title: lang==="en" ? "Add your LinkedIn articles here (cards)" : "Adicione seus artigos do LinkedIn aqui (cards)", url: linkedinUrl },
                    { title: lang==="en" ? "Each card links to LinkedIn" : "Cada card aponta para o LinkedIn", url: linkedinUrl },

                      <div className="mt-2 font-semibold tracking-tight">{a.title}</div>
                      <a href={a.url} target="_blank" rel="noreferrer" className="mt-4 inline-flex rounded-lg px-4 py-2 btn-ghost text-sm">
                        {t.articles.cta}
                      </a>
                    </div>
                  ))}
                </div>

                <div className="mt-8">
                  <a href={linkedinUrl} target="_blank" rel="noreferrer" className="inline-flex rounded-lg px-4 py-2 btn-primary text-sm">
                    {lang==="en" ? "See all articles on LinkedIn" : "Ver todos os artigos no LinkedIn"}
                  </a>
                </div>
              </div>
            </section>

            {/* PODCASTS */}
            <section id="podcasts" className="border-t border-line">
              <div className="max-w-6xl mx-auto px-4 py-14">
                <h2 className="text-2xl md:text-3xl font-semibold tracking-tight">{t.podcasts.title}</h2>
                <p className="mt-2 text-ink/70">{t.podcasts.desc}</p>

                <div className="mt-6 grid md:grid-cols-2 gap-6">
                  <div className="panel rounded-xl p-6 shadow-soft">
                    <div className="font-semibold">Spotify</div>
                    <p className="mt-2 text-sm text-ink/70">

                  <div className="panel rounded-xl p-6 shadow-soft">

                    <Embed html={youtubeEmbed} />

              </div>
            </section>

            {/* CONTACT */}

              <div className="max-w-6xl mx-auto px-4 py-14 grid md:grid-cols-2 gap-8 items-start">
                <div>
                  <h2 className="text-2xl md:text-3xl font-semibold tracking-tight">{t.contact.title}</h2>
                  <p className="mt-2 text-ink/75">{t.contact.desc}</p>

                  <div className="mt-4 text-sm text-ink/70">
                    LinkedIn: <InlineLink href={linkedinUrl}>{linkedinUrl}</InlineLink>
                  </div>
                </div>

                <div className="panel rounded-xl p-6 shadow-soft">
                  <form className="grid gap-3">
                    <input className="hairline rounded-md px-4 py-3 bg-white" placeholder={lang==="en" ? "Name" : "Nome"} />
                    <input className="hairline rounded-md px-4 py-3 bg-white" placeholder="Email" />
                    <select className="hairline rounded-md px-4 py-3 bg-white">
                      <option>{lang==="en" ? "I'm a company (services)" : "Sou empresa (serviços)"}</option>
                      <option>{lang==="en" ? "I'm an individual (mentoring)" : "Sou pessoa (mentoria)"}</option>
                      <option>{lang==="en" ? "Event invitation (speaking)" : "Convite para palestra"}</option>
                    </select>
                    <textarea className="hairline rounded-md px-4 py-3 bg-white" rows="4" placeholder={lang==="en" ? "Message" : "Mensagem"}></textarea>

                    {/* GitHub Pages não roda backend.
                        Para receber mensagens, conecte esse form a Formspree/Tally/Getform e defina action/method.
                    */}

                    <button type="button" className="rounded-lg px-5 py-3 btn-primary text-sm">
                      {t.contact.cta}

                    <p className="text-xs text-ink/50">
                      {lang==="en"
                        ? "To collect submissions, connect this form to Formspree/Tally/Getform (no backend needed)."

                    </p>
                  </form>
                </div>
              </div>
            </section>

            <footer className="border-t border-line">
              <div className="max-w-6xl mx-auto px-4 py-10 text-sm text-ink/60 flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
                <div>{t.footer.rights} {new Date().getFullYear()} Aline da Silva Souza. All rights reserved.</div>
                <div className="flex gap-4 flex-wrap">
                  <a className="link" href={linkedinUrl} target="_blank" rel="noreferrer">LinkedIn</a>
                </div>
              </div>
            </footer>
          </div>

      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<Landing />);
    </script>
  </body>
</html>
